name: Update Kashmir Apple Mandi Prices

on:
  schedule:
    # 03:00 UTC = 8:30 AM IST — after Agmarknet's morning market data is published
    - cron: '0 3 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest mandi prices
        env:
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
        run: node fetch-mandi-prices.mjs

      - name: Commit updated prices (if changed)
        run: |
          git config user.name "mandi-price-bot"
          git config user.email "mandi-price-bot@users.noreply.github.com"
          git add mandi-prices.json
          git diff --staged --quiet || git commit -m "Update mandi prices $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
