name: Update Kashmir Apple Mandi Prices

# Runs automatically every day at 5:00 AM IST (11:30 PM UTC the previous day),
# which is before most orchardists check the site in the morning.
# You can also trigger it manually anytime from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest mandi prices
        env:
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
        run: node fetch-mandi-prices.mjs

      - name: Commit updated prices (if changed)
        run: |
          git config user.name "mandi-price-bot"
          git config user.email "actions@github.com"
          git add mandi-prices.json
          git diff --cached --quiet || git commit -m "Update mandi prices $(date -u +%Y-%m-%d)"
          git push
